const apps = [

  { title: "Graphing Calculator",   url: "https://www.desmos.com/calculator",   category: "Tools",        tags: ["math","graph"] },

  { title: "HTML Playground",       url: "https://codepen.io/pen/",             category: "Coding",       tags: ["html","css","js"] },

];

let lastSelectedGame = null;
let lastSelectedApp = null;

// =========================
// RENDER LISTS
// =========================

function renderLists(filteredGames = null, filteredApps = null) {
  const gList = document.getElementById("gameList");
  const aList = document.getElementById("appList");
  gList.innerHTML = "";
  aList.innerHTML = "";

  const g = filteredGames || games;
  const a = filteredApps || apps;

  g.forEach(game => {
    const li = document.createElement("li");
    li.className = "list-item";
    li.textContent = game.title;
    li.onclick = () => loadGame(game);
    gList.appendChild(li);
  });

  a.forEach(app => {
    const li = document.createElement("li");
    li.className = "list-item";
    li.textContent = app.title;
    li.onclick = () => loadApp(app);
    aList.appendChild(li);
  });
}

// =========================
// LOAD GAME / APP
// =========================

function loadGame(g) {
  lastSelectedGame = g;
  document.getElementById("viewerTitle").textContent = g.title + " (Game)";
  document.getElementById("viewerFrame").src = g.url;
}

function loadApp(a) {
  lastSelectedApp = a;
  document.getElementById("viewerTitle").textContent = a.title + " (App)";
  document.getElementById("viewerFrame").src = a.url;
}

// =========================
// SEARCH
// =========================

function setupSearch() {
  const searchInput = document.getElementById("searchInput");
  searchInput.addEventListener("input", () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) {
      renderLists();
      return;
    }

    const filteredGames = games.filter(g =>
      g.title.toLowerCase().includes(q) ||
      g.category.toLowerCase().includes(q) ||
      (g.tags && g.tags.some(t => t.toLowerCase().includes(q)))
    );

    const filteredApps = apps.filter(a =>
      a.title.toLowerCase().includes(q) ||
      a.category.toLowerCase().includes(q) ||
      (a.tags && a.tags.some(t => t.toLowerCase().includes(q)))
    );

    renderLists(filteredGames, filteredApps);
  });
}

// =========================
// AI HELPER (FAKE COPILOT)
// =========================

function addAIMessage(text, who="bot") {
  const chat = document.getElementById("aiChat");
  const msg = document.createElement("div");
  msg.className = "ai-msg " + (who === "user" ? "ai-user" : "ai-bot");
  msg.textContent = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

const aiKnowledge = [
  {
    test: t => t.includes("best") && t.includes("game"),
    reply: () => "Some strong picks: Slope, Run 3, Moto X3M, Retro Bowl, and 1v1.lol. You can also type /random game."
  },
  {
    test: t => t.includes("best") && t.includes("app"),
    reply: () => "For apps, Desmos calculators, Pixel Art Editor, and CodePen are great. Try /random app."
  },
  {
    test: t => t.includes("school") || t.includes("blocked"),
    reply: () => "I can’t see your school’s filter, but these are iframe‑friendly sites. If one is blocked, try another or swap the URL in the code."
  },
  {
    test: t => t.includes("search"),
    reply: () => "Use the search bar at the top. It filters both games and apps by title, category, and tags in real time."
  },
  {
    test: t => t.includes("add") && t.includes("game"),
    reply: () => "To add a game, copy one of the objects in the games array and change the title/url/category/tags."
  },
  {
    test: t => t.includes("add") && t.includes("app"),
    reply: () => "To add an app, copy one of the objects in the apps array and change the title/url/category/tags."
  },
  {
    test: t => t.includes("how") && t.includes("work"),
    reply: () => "VORTEX Hub = left side lists games/apps, center iframe loads them, bottom panel is me. Search filters everything."
  },
  {
    test: t => t.includes("who") && t.includes("you"),
    reply: () => "I’m the local VORTEX helper—scripted, not cloud AI—but tuned to feel smart and useful inside this page."
  }
];

function aiCommandHelp() {
  return [
    "Commands you can use:",
    "• /help – show this help",
    "• /random game – load a random game",
    "• /random app – load a random app",
    "• /last game – info about the last game you opened",
    "• /last app – info about the last app you opened",
    "• /info – explain how VORTEX works"
  ].join("\n");
}

function aiHandleCommand(text) {
  const lower = text.toLowerCase();

  if (lower === "/help") {
    return aiCommandHelp();
  }
  if (lower === "/info") {
    return "VORTEX Hub is a web launcher: left = games/apps, center = iframe, bottom = AI helper. Search filters everything.";
  }
  if (lower === "/random game") {
    if (!games.length) return "No games are configured yet.";
    const g = games[Math.floor(Math.random() * games.length)];
    loadGame(g);
    return "Random game loaded: " + g.title;
  }
  if (lower === "/random app") {
    if (!apps.length) return "No apps are configured yet.";
    const a = apps[Math.floor(Math.random() * apps.length)];
    loadApp(a);
    return "Random app loaded: " + a.title;
  }
  if (lower === "/last game") {
    if (!lastSelectedGame) return "You haven’t opened any game yet.";
    return "Last game you opened was: " + lastSelectedGame.title + " (" + lastSelectedGame.category + ").";
  }
  if (lower === "/last app") {
    if (!lastSelectedApp) return "You haven’t opened any app yet.";
    return "Last app you opened was: " + lastSelectedApp.title + " (" + lastSelectedApp.category + ").";
  }

  return null;
}

function handleAI() {
  const input = document.getElementById("aiInput");
  const text = input.value.trim();
  if (!text) return;

  addAIMessage(text, "user");
  input.value = "";

  // Commands
  if (text.startsWith("/")) {
    const cmdReply = aiHandleCommand(text);
    if (cmdReply) {
      setTimeout(() => addAIMessage(cmdReply, "bot"), 150);
      return;
    } else {
      setTimeout(() => addAIMessage("Unknown command. Type /help to see what I can do.", "bot"), 150);
      return;
    }
  }

  const lower = text.toLowerCase();

  // Knowledge-based replies
  for (const item of aiKnowledge) {
    try {
      if (item.test(lower)) {
        const reply = typeof item.reply === "function" ? item.reply() : item.reply;
        setTimeout(() => addAIMessage(reply, "bot"), 200);
        return;
      }
    } catch (e) {
      // ignore bad test
    }
  }

  // Generic fallback
  const fallback = "I’m a local VORTEX helper, not full cloud AI, but I can help with games, apps, search, and commands like /help, /random game, /random app.";
  setTimeout(() => addAIMessage(fallback, "bot"), 200);
}

function setupAI() {
  const btn = document.getElementById("aiSend");
  const input = document.getElementById("aiInput");

  btn.addEventListener("click", handleAI);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      handleAI();
    }
  });

  addAIMessage("Welcome to VORTEX Hub. Type /help to see what I can do, or just ask about games, apps, or search.", "bot");
}

// =========================
// INIT
// =========================

document.addEventListener("DOMContentLoaded", () => {
  renderLists();
  setupSearch();
  setupAI();
  if (games[0]) loadGame(games[0]);
});
</script>
