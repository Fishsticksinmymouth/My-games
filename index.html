<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VORTEX Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* ——— GLOBAL THEME ——— */
    :root {
      --bg: #020617;
      --card: #0f172a;
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.18);
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #020617 0, #020617 40%, #000 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ——— START SCREEN ——— */
    .start-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .start-card {
      position: relative;
      max-width: 480px;
      width: 100%;
      border-radius: 1.5rem;
      padding: 1.75rem;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.25), transparent 55%),
        radial-gradient(circle at bottom right, rgba(129, 140, 248, 0.25), transparent 55%),
        linear-gradient(145deg, #020617, #020617);
      border: 1px solid rgba(148, 163, 184, 0.5);
      box-shadow: 0 30px 80px rgba(15, 23, 42, 0.95);
      overflow: hidden;
    }

    .start-glow {
      position: absolute;
      inset: -40%;
      background:
        radial-gradient(circle at 10% 0, rgba(56, 189, 248, 0.18), transparent 55%),
        radial-gradient(circle at 90% 100%, rgba(129, 140, 248, 0.18), transparent 55%);
      opacity: 0.9;
      pointer-events: none;
    }

    .start-inner {
      position: relative;
      z-index: 1;
    }

    .start-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(148, 163, 184, 0.5);
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 0.9rem;
    }

    .start-pill-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 10px rgba(129, 140, 248, 0.9);
    }

    .start-logo {
      font-size: 2.4rem;
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      font-weight: 800;
      margin-bottom: 0.4rem;
      background: linear-gradient(120deg, #e5e7eb, #a5b4fc, #38bdf8);
      -webkit-background-clip: text;
      color: transparent;
      text-align: left;
    }

    .start-sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 1.4rem;
      max-width: 22rem;
    }

    .start-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.4rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .start-stat {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .start-stat strong {
      font-size: 1.1rem;
      color: var(--text-main);
    }

    .start-btn-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .btn {
      border-radius: 999px;
      padding: 0.6rem 1.3rem;
      font-size: 0.9rem;
      border: 1px solid transparent;
      cursor: pointer;
      transition: 0.18s ease;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: none;
      color: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #22c55e);
      color: #020617;
      font-weight: 600;
      box-shadow: 0 14px 35px rgba(79, 70, 229, 0.6);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(79, 70, 229, 0.8);
    }

    .btn-ghost {
      background: rgba(15, 23, 42, 0.9);
      border-color: rgba(148, 163, 184, 0.6);
      color: var(--text-muted);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--text-main);
      background: rgba(15, 23, 42, 1);
    }

    /* ——— APP SHELL ——— */
    .app-shell {
      display: none;
      min-height: 100vh;
      grid-template-columns: 240px minmax(0, 1fr);
      background: radial-gradient(circle at top, #020617 0, #020617 40%, #000 100%);
    }

    @media (max-width: 900px) {
      .app-shell {
        grid-template-columns: minmax(0, 1fr);
      }
      .sidebar {
        position: sticky;
        top: 0;
        z-index: 10;
      }
    }

    .sidebar {
      border-right: 1px solid rgba(15, 23, 42, 0.95);
      background: linear-gradient(to bottom, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.96));
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .side-logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .side-logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: radial-gradient(circle, #22c55e, #16a34a);
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.9);
    }

    .side-tag {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .nav-group {
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .nav-btn {
      width: 100%;
      text-align: left;
      border-radius: 0.7rem;
      padding: 0.55rem 0.7rem;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      transition: 0.16s ease;
    }

    .nav-btn span.icon {
      width: 20px;
      text-align: center;
      opacity: 0.9;
    }

    .nav-btn.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--text-main);
    }

    .nav-btn:hover {
      background: rgba(15, 23, 42, 0.9);
      border-color: rgba(55, 65, 81, 0.9);
      color: var(--text-main);
    }

    .side-footer {
      margin-top: auto;
      font-size: 0.7rem;
      color: var(--text-muted);
      opacity: 0.8;
    }

    .side-footer code {
      font-size: 0.7rem;
      background: rgba(15, 23, 42, 0.9);
      padding: 0.1rem 0.3rem;
      border-radius: 0.3rem;
      border: 1px solid rgba(31, 41, 55, 0.9);
    }

    /* ——— MAIN AREA ——— */
    .main {
      padding: 1.25rem 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .top-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: space-between;
      align-items: center;
    }

    .top-title {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .top-title h1 {
      font-size: 1.1rem;
    }

    .top-title span {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .search-wrap {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.7rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(55, 65, 81, 0.9);
      min-width: 220px;
    }

    .search-wrap span {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .search-wrap input {
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-main);
      font-size: 0.85rem;
      width: 100%;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 2fr);
      gap: 1rem;
    }

    @media (max-width: 900px) {
      .content-grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .card {
      background: rgba(15, 23, 42, 0.96);
      border-radius: 1rem;
      border: 1px solid rgba(55, 65, 81, 0.9);
      padding: 0.9rem;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.9);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
      font-size: 0.85rem;
    }

    .card-header span {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.6rem;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    .item-card {
      background: rgba(15, 23, 42, 0.98);
      border-radius: 0.8rem;
      border: 1px solid rgba(55, 65, 81, 0.9);
      padding: 0.4rem;
      cursor: pointer;
      transition: 0.16s ease;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.8rem;
    }

    .item-card:hover {
      border-color: var(--accent);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.95);
      transform: translateY(-1px);
    }

    .item-thumb {
      border-radius: 0.6rem;
      overflow: hidden;
      border: 1px solid rgba(31, 41, 55, 0.9);
      background: #020617;
      aspect-ratio: 16 / 9;
    }

    .item-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .item-meta {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .item-meta span {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .item-tag {
      align-self: flex-start;
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 999px;
      background: rgba(99, 102, 241, 0.12);
      color: #a5b4fc;
      border: 1px solid rgba(99, 102, 241, 0.6);
    }

    .viewer {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .viewer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }

    .viewer-title {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .viewer-title span {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .viewer-tag {
      font-size: 0.7rem;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      background: rgba(34, 197, 94, 0.12);
      color: #4ade80;
      border: 1px solid rgba(34, 197, 94, 0.6);
    }

    .viewer-frame {
      position: relative;
      border-radius: 0.9rem;
      overflow: hidden;
      border: 1px solid rgba(30, 64, 175, 0.9);
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.9), #020617);
      min-height: 260px;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .viewer-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 1rem;
    }

    /* ——— SETTINGS ——— */
    .settings-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .setting-row {
      background: rgba(15, 23, 42, 0.98);
      border-radius: 0.8rem;
      border: 1px solid rgba(55, 65, 81, 0.9);
      padding: 0.6rem 0.7rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
    }

    .setting-row span {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .toggle {
      width: 38px;
      height: 20px;
      border-radius: 999px;
      background: rgba(31, 41, 55, 0.9);
      border: 1px solid rgba(55, 65, 81, 0.9);
      position: relative;
      cursor: pointer;
    }

    .toggle-knob {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #e5e7eb;
