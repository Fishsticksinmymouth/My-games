<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VORTEX Hub</title>

<style>
  body {
    margin: 0;
    background: #0a0a12;
    color: white;
    font-family: Arial, sans-serif;
    overflow-x: hidden;
  }

  header {
    background: #111;
    padding: 15px;
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  #searchInput {
    width: 80%;
    padding: 10px;
    margin: 15px auto;
    display: block;
    border-radius: 6px;
    border: none;
    outline: none;
    font-size: 16px;
  }

  .category {
    padding: 10px 20px;
    font-size: 22px;
    font-weight: bold;
    margin-top: 25px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
    padding: 0 20px 20px;
  }

  .game-card {
    background: #141422;
    border-radius: 8px;
    padding: 10px;
    cursor: pointer;
    transition: 0.2s;
    text-align: center;
  }

  .game-card:hover {
    background: #1f1f33;
    transform: scale(1.05);
  }

  .game-thumb {
    width: 100%;
    height: 120px;
    background: #222;
    border-radius: 6px;
    margin-bottom: 8px;
  }

  .ai-panel {
    background: #141422;
    padding: 15px;
    margin-top: 30px;
  }

  #aiChat {
    height: 150px;
    overflow-y: auto;
    background: #1b1b2d;
    padding: 10px;
    border-radius: 6px;
    margin-bottom: 10px;
  }

  .ai-msg {
    padding: 6px;
    margin-bottom: 6px;
    border-radius: 4px;
    max-width: 90%;
  }

  .ai-bot { background: #1f1f3a; }
  .ai-user { background: #2b7cff; margin-left: auto; }

  #aiInput {
    width: 80%;
    padding: 8px;
    border-radius: 4px;
    border: none;
    outline: none;
  }

  #aiSend {
    padding: 8px 12px;
    background: #2b7cff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
</style>
</head>

<body>

<header>VORTEX Hub</header>

<input id="searchInput" placeholder="Search games & apps...">

<div id="content"></div>

<div class="ai-panel">
  <div id="aiChat"></div>
  <input id="aiInput" placeholder="Ask the VORTEX helper...">
  <button id="aiSend">Send</button>
</div>

<script>
const categories = {
  "Racing": [
    { title: "Drift Hunters", url: "https://ubg100.github.io/drift-hunters/" },
    { title: "Madalin Stunt Cars 2", url: "https://ubg100.github.io/madalin-stunt-cars-2/" },
    { title: "Moto X3M", url: "https://ubg100.github.io/moto-x3m/" }
  ],
  "Parkour": [
    { title: "Slope", url: "https://ubg100.github.io/slope/" },
    { title: "Run 3", url: "https://ubg100.github.io/run-3/" },
    { title: "Tunnel Rush", url: "https://ubg100.github.io/tunnel-rush/" }
  ],
  "FPS": [
    { title: "1v1.lol", url: "https://ubg100.github.io/1v1-lol/" },
    { title: "Shell Shockers", url: "https://ubg100.github.io/shell-shockers/" },
    { title: "Krunker", url: "https://ubg100.github.io/krunker-io/" }
  ],
  "Sports": [
    { title: "Basketball Stars", url: "https://ubg100.github.io/basketball-stars/" },
    { title: "Retro Bowl", url: "https://ubg100.github.io/retro-bowl/" }
  ],
  "Classics": [
    { title: "Geometry Dash", url: "https://ubg100.github.io/geometry-dash/" },
    { title: "2048", url: "https://ubg100.github.io/2048/" },
    { title: "Cut the Rope", url: "https://ubg100.github.io/cut-the-rope/" }
  ]
};

function render() {
  const container = document.getElementById("content");
  container.innerHTML = "";

  for (const cat in categories) {
    const section = document.createElement("div");
    section.innerHTML = `<div class='category'>${cat}</div>`;

    const grid = document.createElement("div");
    grid.className = "grid";

    categories[cat].forEach(game => {
      const card = document.createElement("div");
      card.className = "game-card";
      card.onclick = () => window.open(game.url, "_blank");

      card.innerHTML = `
        <div class="game-thumb"></div>
        <div>${game.title}</div>
      `;

      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  }
}

render();

// SEARCH
document.getElementById("searchInput").addEventListener("input", () => {
  const q = searchInput.value.toLowerCase();
  const container = document.getElementById("content");
  container.innerHTML = "";

  for (const cat in categories) {
    const filtered = categories[cat].filter(g => g.title.toLowerCase().includes(q));
    if (filtered.length === 0) continue;

    const section = document.createElement("div");
    section.innerHTML = `<div class='category'>${cat}</div>`;

    const grid = document.createElement("div");
    grid.className = "grid";

    filtered.forEach(game => {
      const card = document.createElement("div");
      card.className = "game-card";
      card.onclick = () => window.open(game.url, "_blank");
      card.innerHTML = `<div class="game-thumb"></div><div>${game.title}</div>`;
      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  }
});

// AI
function addAIMessage(text, who="bot") {
  const chat = document.getElementById("aiChat");
  const msg = document.createElement("div");
  msg.className = "ai-msg " + (who === "user" ? "ai-user" : "ai-bot");
  msg.textContent = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function handleAI() {
  const input = document.getElementById("aiInput");
  const text = input.value.trim();
  if (!text) return;

  addAIMessage(text, "user");
  input.value = "";

  const lower = text.toLowerCase();

  if (lower.includes("best game")) {
    return addAIMessage("Slope, Drift Hunters, Retro Bowl, and 1v1.lol are top picks.");
  }

  if (lower.includes("help")) {
    return addAIMessage("Click any game card to open it in a new tab. Search filters everything.");
  }

  addAIMessage("I can help with games, search, and info. Try asking: 'best game'.");
}

document.getElementById("aiSend").addEventListener("click", handleAI);
document.getElementById("aiInput").addEventListener("keydown", e => {
  if (e.key === "Enter") handleAI();
});

addAIMessage("Welcome to the new VORTEX Hub!");
</script>

</body>
</html>
